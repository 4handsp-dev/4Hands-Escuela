  --cream:#FBF3E4;        /* NR050-P Jengibre dulce */
  --lago:#BED4CF;         /* VD214-T Gran lago */
  --gris:#4B4B4C;         /* NE238-D Gris ratón */
  --noche:#1c1c1c;        /* NE287-A Paisaje nocturno */
  --onix:#8B8B8C;         /* NE230-D Ónix profundo */
  --plata:#F1F1F1;        /* NE226-P Estrella de plata */

  --ink:#1c1c1c;
  --muted:#5a5a5b;
  --paper:#FBF3E4;
  --paper-2:#FFFDF7;
  --paper-3:#F5EDDC;

  --font-title:'Ibrand','Satoshi',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-sub:'Gotu','Satoshi',ui-sans-serif,system-ui,sans-serif;
  --font-body:'Satoshi',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;

  --maxw:1140px;
  --radius:18px;
  --radius-sm:12px;
  --radius-xs:8px;

  --shadow-sm:0 1px 2px rgba(9,62,94,.05),0 3px 10px rgba(9,62,94,.06);
  --shadow-md:0 10px 30px -8px rgba(9,62,94,.18);
  --shadow-navy:0 22px 48px -16px rgba(4,32,47,.55);
  --ring-focus:0 0 0 3px rgba(241,132,70,.45);
}

/* ===================== Reset / base ===================== */
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--paper);
  line-height:1.62;
  font-size:17px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
img{max-width:100%;display:block}
a{color:inherit}
button{font-family:inherit}
/* Tracking measured from the brand's own material: Ibrand titles sit at ~+0.08em at ~31px.
   Scaled down for larger display sizes below. */
h1,h2,h3,h4{margin:0;font-family:var(--font-title);font-weight:800;line-height:1.12;letter-spacing:.06em;color:var(--morazul)}
p{margin:0 0 1rem}
[v-cloak]{display:none}

/* utility layout */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(18px,4vw,40px)}
.section{padding:clamp(56px,8vw,104px) 0}
.eyebrow{
  font-family:var(--font-sub);
  text-transform:uppercase;
  letter-spacing:.16em;
  font-size:.74rem;
  font-weight:400;
  color:var(--naranja);
  display:inline-flex;align-items:center;gap:.55em;
  margin:0 0 .9rem;
}
.eyebrow .rule{width:26px;height:2px;background:var(--naranja);display:inline-block;border-radius:2px}
.sub{font-family:var(--font-sub)}

/* section heading block */
.head{max-width:760px}
.head h2{font-size:clamp(1.75rem,3.6vw,2.7rem);letter-spacing:.05em}
.head .lead{font-size:clamp(1.02rem,1.6vw,1.18rem);color:var(--muted);margin-top:1rem}

/* ===================== Icons ===================== */
.ic{width:1.25em;height:1.25em;flex:none;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.15em}

/* ===================== Buttons ===================== */
.btn{
  --bg:var(--naranja);--fg:#06263a;--bd:transparent;
  display:inline-flex;align-items:center;gap:.5em;
  background:var(--bg);color:var(--fg);
  border:1.5px solid var(--bd);
  padding:.72em 1.25em;border-radius:999px;
  font-weight:700;font-size:.98rem;letter-spacing:.005em;
  cursor:pointer;text-decoration:none;
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease, border-color .16s ease;
  box-shadow:var(--shadow-sm);
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn:active{transform:translateY(0)}
.btn:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.btn.primary:hover{background:var(--naranja-2)}
.btn.ghost{--bg:transparent;--fg:var(--cream);--bd:rgba(255,255,255,.28);box-shadow:none}
.btn.ghost:hover{background:rgba(255,255,255,.08);--bd:rgba(255,255,255,.5)}
.btn.gold{--bg:var(--gold);--fg:#4a3410}
.btn.gold:hover{background:#f8cf85}
.cta-legend{margin-top:.85rem;font-size:.87rem;color:rgba(234,241,245,.78);max-width:56ch}
.cta-legend b{color:var(--gold);font-weight:700}
.qr-block{margin-top:18px;padding-top:18px;border-top:1px dashed rgba(255,255,255,.22);display:flex;gap:16px;align-items:center}
.qr-block img{width:112px;height:112px;border-radius:12px;flex:none;image-rendering:pixelated;box-shadow:0 6px 18px -8px rgba(0,0,0,.5)}
.qr-block p{margin:0;font-family:var(--font-sub);font-size:.92rem;color:var(--gold);line-height:1.45}
.btn.outline{--bg:transparent;--fg:var(--morazul);--bd:rgba(9,62,94,.28);box-shadow:none}
.btn.outline:hover{background:var(--morazul);--fg:#fff;--bd:var(--morazul)}
.btn.sm{padding:.5em .85em;font-size:.86rem}
.btn.block{width:100%;justify-content:center}

/* small icon button */
.iconbtn{
  display:inline-flex;align-items:center;justify-content:center;gap:.4em;
  background:rgba(255,255,255,.06);color:var(--cream);
  border:1px solid rgba(255,255,255,.16);
  border-radius:10px;padding:.5em .7em;font-size:.86rem;font-weight:600;
  cursor:pointer;transition:background .15s ease,border-color .15s ease,transform .15s ease;
}
.iconbtn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.35)}
.iconbtn:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.iconbtn.on{background:var(--naranja);color:#06263a;border-color:transparent}

/* ===================== Header ===================== */
.site-header{
  position:sticky;top:0;z-index:50;
  background:color-mix(in srgb,var(--morazul) 92%, transparent);
  backdrop-filter:saturate(140%) blur(8px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.site-header .wrap{max-width:1400px}
.nav .cta-mini{white-space:nowrap}
.nav{display:flex;align-items:center;gap:18px;height:66px}
.brand{display:flex;align-items:center;gap:0;text-decoration:none;flex:none}
.brand img{height:40px;width:auto;border-radius:8px}
.brand .bt{display:none}
.nav-links{display:none;gap:16px;margin-left:8px}
.nav-links a{
  font-family:var(--font-sub);color:rgba(255,255,255,.82);text-decoration:none;
  font-size:.92rem;padding:6px 2px;position:relative;transition:color .15s ease;
}
.nav-links a:hover{color:#fff}
.nav-links a::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--naranja);transform:scaleX(0);transform-origin:left;transition:transform .2s ease}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-tools .toolset{display:flex;gap:6px}
.nav .cta-mini{display:none}
@media (max-width:1079px){.toolset .iconbtn span{display:none}.toolset .iconbtn{padding:.5em}}

/* ===================== Hero ===================== */
.hero{position:relative;background:var(--morazul);color:#eaf1f5;overflow:hidden}
.hero::before{ /* soft glow */
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(120% 90% at 88% -10%, rgba(241,132,70,.22), transparent 55%),
    radial-gradient(90% 80% at 0% 110%, rgba(190,212,207,.14), transparent 60%);
  pointer-events:none;
}
.hero-route{position:absolute;inset:0;opacity:.5;pointer-events:none}
.hero-inner{position:relative;padding:clamp(48px,7vw,86px) 0 clamp(56px,8vw,96px)}
.hero .eyebrow{color:var(--gold)}
.hero .eyebrow .rule{background:var(--gold)}
.hero h1{
  color:#fff;font-size:clamp(2.1rem,5.2vw,3.7rem);line-height:1.1;letter-spacing:.035em;
  max-width:21ch;margin-top:.2em;
}
.hero h1 .hl{color:var(--gold)}
.pill{
  display:inline-flex;align-items:center;gap:.5em;
  margin:1.35rem 0 0;background:var(--naranja);color:#06263a;
  font-family:var(--font-sub);font-size:clamp(.95rem,1.6vw,1.15rem);
  padding:.55em 1.1em;border-radius:999px;font-weight:400;
  box-shadow:0 8px 22px -8px rgba(241,132,70,.6);
}
.hero-lead{max-width:56ch;color:rgba(234,241,245,.9);font-size:clamp(1.02rem,1.5vw,1.16rem);margin-top:1.4rem}
.hero-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:1.9rem}
.hero-stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:2.3rem}
.stat{
  display:flex;align-items:center;gap:.55em;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:12px;padding:.6em .9em;font-size:.9rem;color:#eaf1f5;
}
.stat .ic{color:var(--gold)}
.stat b{font-weight:700;color:#fff}

/* ===================== Tools drawer (edit + import) ===================== */
.drawer{background:var(--morazul-2);color:#eaf1f5;border-bottom:1px solid rgba(255,255,255,.08)}
.drawer-in{padding:20px 0}
.drawer h3{color:#fff;font-size:1.05rem;display:flex;align-items:center;gap:.5em}
.drawer p{color:rgba(234,241,245,.78);font-size:.92rem}
.drawer .cols{display:grid;gap:22px;grid-template-columns:1fr;margin-top:6px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-family:var(--font-sub);font-size:.82rem;color:var(--gold);letter-spacing:.02em}
.field input[type="date"],.field input[type="text"],.field textarea{
  background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.3);
  border-radius:10px;padding:.6em .75em;font-family:var(--font-body);font-size:.95rem;color:#12303f;
}
.field input:focus,.field textarea:focus{outline:none;box-shadow:var(--ring-focus)}
.field textarea{resize:vertical;line-height:1.45}
.edit-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
.status{margin-top:12px;font-size:.9rem;padding:.6em .8em;border-radius:10px;background:rgba(190,212,207,.16);border:1px solid rgba(190,212,207,.3);color:#eaf1f5}
.status.warn{background:rgba(241,132,70,.16);border-color:rgba(241,132,70,.4)}

/* ===================== Purpose ===================== */
.sec-purpose{background:var(--paper)}
.purpose-lead{font-size:clamp(1.08rem,1.9vw,1.32rem);color:var(--gris);max-width:60ch;font-weight:500}
.two-col{display:grid;gap:clamp(26px,4vw,54px);grid-template-columns:1fr;margin-top:clamp(30px,4vw,52px)}
.col-title{font-family:var(--font-sub);font-weight:400;color:var(--morazul);font-size:1.15rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5em}
.col-title .ic{color:var(--naranja)}
.cap-list{list-style:none;padding:0;margin:0;display:grid;gap:12px}
.cap{display:grid;grid-template-columns:40px 1fr;gap:14px;align-items:start;padding:14px 16px;background:var(--paper-2);border:1px solid rgba(9,62,94,.08);border-radius:14px;box-shadow:var(--shadow-sm)}
.cap .badge{width:40px;height:40px;border-radius:11px;background:var(--tofu);color:var(--morazul);display:grid;place-items:center}
.cap b{display:block;font-family:var(--font-body);font-weight:700;color:var(--morazul);line-height:1.25}
.cap span{color:var(--muted);font-size:.92rem}
.ent-card{background:var(--morazul);color:#eaf1f5;border-radius:var(--radius);padding:clamp(22px,3vw,32px);box-shadow:var(--shadow-navy)}
.ent-card .col-title{color:#fff}
.ent-card .col-title .ic{color:var(--gold)}
.ent-list{list-style:none;padding:0;margin:0;display:grid;gap:10px}
.ent-list li{display:flex;align-items:flex-start;gap:.65em;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.14);font-size:1rem}
.ent-list li:last-child{border-bottom:0}
.ent-list .ic{color:var(--gold);margin-top:.15em}
.tagline{
  margin-top:clamp(30px,4vw,50px);
  background:var(--lago);border-radius:var(--radius);
  padding:clamp(22px,3vw,30px) clamp(24px,4vw,38px);
  display:flex;gap:18px;align-items:flex-start;
}
.tagline .ic{color:var(--morazul);width:1.7em;height:1.7em;flex:none}
.tagline p{margin:0;color:#123246;font-size:clamp(1rem,1.6vw,1.14rem);font-weight:500}

/* ===================== Route ===================== */
.sec-ruta{background:var(--paper-2);--ring:var(--paper-2)}
.switch-wrap{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;margin-top:22px}
.switch{display:inline-flex;background:var(--paper-3);border:1px solid rgba(9,62,94,.1);border-radius:999px;padding:5px;gap:4px}
.switch button{
  border:0;background:transparent;color:var(--gris);cursor:pointer;
  font-family:var(--font-sub);font-size:.92rem;font-weight:400;
  padding:.6em 1.1em;border-radius:999px;transition:all .18s ease;white-space:nowrap;
}
.switch button .ic{width:1.05em;height:1.05em}
.switch button.on{background:var(--morazul);color:#fff;box-shadow:var(--shadow-sm)}
.switch button:focus-visible{outline:none;box-shadow:var(--ring-focus)}
@media (max-width:600px){
  .switch{width:100%;flex-direction:column;border-radius:16px}
  .switch button{width:100%;white-space:normal}
  .switch-wrap{gap:12px}
}
.opt-meta{display:flex;flex-wrap:wrap;gap:10px}
.opt-chip{display:inline-flex;align-items:center;gap:.5em;background:var(--tofu);border:1px solid rgba(9,62,94,.08);border-radius:10px;padding:.5em .8em;font-size:.88rem;color:var(--gris)}
.opt-chip .ic{color:var(--naranja);width:1.05em;height:1.05em}
.opt-chip b{color:var(--morazul)}
.intensive-note{
  margin-top:16px;display:flex;gap:12px;align-items:flex-start;
  background:var(--tofu);border:1px solid rgba(241,132,70,.35);border-radius:12px;
  padding:14px 18px;font-size:.93rem;color:var(--gris);
}
.intensive-note .ic{color:var(--naranja);flex:none;margin-top:.15em}
.intensive-note a{color:var(--naranja);font-weight:700}

.startbar{display:grid;gap:16px;grid-template-columns:1fr;margin-top:22px;background:var(--paper-3);border:1px solid rgba(9,62,94,.1);border-radius:16px;padding:18px}
.startbar .field label{color:var(--morazul)}
.startbar .field input{background:#fff;border:1px solid rgba(9,62,94,.2);color:#12303f}
.startbar .hintline{grid-column:1/-1;display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:.88rem}

.route{list-style:none;padding:0;margin:clamp(30px,4vw,46px) 0 0;position:relative;counter-reset:step}
.route::before{content:'';position:absolute;left:26px;top:16px;bottom:16px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--naranja),var(--gold) 70%,var(--lago));opacity:.85}
.route-item{display:grid;grid-template-columns:56px 1fr;gap:clamp(14px,2vw,24px);padding:11px 0;align-items:start}
.route-marker{position:relative;z-index:1;display:flex;justify-content:center;padding-top:4px}
.route-num{
  width:46px;height:46px;border-radius:50%;
  background:var(--morazul);color:var(--gold);
  display:grid;place-items:center;
  font-family:var(--font-title);font-weight:800;font-size:1.15rem;
  border:4px solid var(--ring);box-shadow:0 6px 16px -6px rgba(9,62,94,.5);
  transition:transform .2s ease, background .2s ease, color .2s ease;
}
.route-item:hover .route-num{background:var(--naranja);color:#06263a;transform:scale(1.06)}
.route-card{
  background:var(--paper);border:1px solid rgba(9,62,94,.09);border-radius:14px;
  padding:16px 18px;box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;gap:8px;
  transition:box-shadow .2s ease, transform .2s ease, border-color .2s ease;
}
.route-item:hover .route-card{box-shadow:var(--shadow-md);border-color:rgba(9,62,94,.18)}
.route-title{font-family:var(--font-body);font-weight:700;font-size:1.04rem;color:var(--morazul);line-height:1.3}
.route-card .edit-title{
  font-family:var(--font-body);font-weight:700;font-size:1.04rem;color:var(--morazul);line-height:1.3;
  background:#fff;border:1px solid rgba(9,62,94,.22);border-radius:8px;padding:.4em .55em;width:100%;
}
.route-card .edit-title:focus{outline:none;box-shadow:var(--ring-focus)}
.when{display:inline-flex;align-items:center;gap:.5em;align-self:flex-start;font-family:var(--font-sub);font-size:.82rem;color:var(--naranja);background:var(--tofu);border:1px solid rgba(241,132,70,.22);border-radius:999px;padding:.28em .75em}
.when .ic{width:1em;height:1em}
.when.tbd{color:var(--onix);background:var(--plata);border-color:rgba(139,139,140,.25)}
.route-card input[type="date"]{margin-top:2px;background:#fff;border:1px solid rgba(9,62,94,.22);border-radius:8px;padding:.4em .55em;font-family:var(--font-body);font-size:.86rem;color:#12303f;max-width:200px}
.route-card input[type="date"]:focus{outline:none;box-shadow:var(--ring-focus)}
.base-note{margin-top:26px;font-size:.9rem;color:var(--muted);display:flex;align-items:center;gap:.5em}
.base-note .ic{color:var(--naranja)}

/* ===================== Details ===================== */
.sec-details{background:var(--paper)}
.detail-grid{display:grid;gap:18px;grid-template-columns:1fr;margin-top:clamp(30px,4vw,48px)}
.detail{
  background:var(--paper-2);border:1px solid rgba(9,62,94,.09);border-radius:16px;
  padding:22px 22px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:6px;
}
.detail .dhead{display:flex;align-items:center;gap:.6em;color:var(--naranja)}
.detail .dhead .ic{width:1.4em;height:1.4em}
.detail .dhead h3{font-family:var(--font-sub);font-weight:400;font-size:1.02rem;color:var(--morazul)}
.detail p{margin:0;color:var(--gris);font-size:.98rem}
.detail small{color:var(--onix);font-size:.82rem}
.detail.price{background:var(--morazul);color:#eaf1f5;border-color:transparent;box-shadow:var(--shadow-navy)}
.detail.price .dhead,.detail.price .dhead h3{color:#fff}
.detail.price .dhead .ic{color:var(--gold)}
.price-amount{font-family:var(--font-title);font-weight:800;color:#fff;font-size:clamp(1.6rem,3vw,2.1rem);letter-spacing:.05em;line-height:1.15;margin-top:2px}
.detail.price small{color:rgba(234,241,245,.8)}
.detail.price .plus{display:inline-block;font-family:var(--font-sub);font-size:.9rem;color:var(--gold);margin-top:2px}

/* Group training banner */
.group-cta{
  margin-top:18px;
  display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;
  background:linear-gradient(135deg,var(--tofu),var(--cream));
  border:1px solid rgba(241,132,70,.35);
  border-radius:var(--radius);
  padding:clamp(20px,3vw,26px) clamp(22px,3.5vw,32px);
  box-shadow:var(--shadow-sm);
}
.group-cta .gic{width:54px;height:54px;border-radius:15px;background:var(--naranja);color:#fff;display:grid;place-items:center;flex:none}
.group-cta .gic .ic{width:1.7em;height:1.7em}
.group-cta h3{font-size:1.2rem;margin-bottom:6px}
.group-cta p{margin:0;color:var(--gris);font-size:.97rem;max-width:70ch}
.group-cta .btn{justify-self:start;white-space:nowrap}
.group-actions{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
.group-contact{display:flex;flex-direction:column;gap:6px;font-size:.88rem}
.group-contact a{color:var(--morazul);text-decoration:none;display:inline-flex;gap:.5em;align-items:center;font-weight:600}
.group-contact a:hover{text-decoration:underline}
.group-contact .ic{width:1.05em;height:1.05em;color:var(--naranja)}
@media (max-width:819px){
  .group-cta{grid-template-columns:1fr;gap:14px}
  .group-cta .btn{white-space:normal}
}

/* ===================== Benefits ===================== */
.sec-benefits{background:var(--morazul);color:#eaf1f5;position:relative;overflow:hidden}
.sec-benefits::before{content:'';position:absolute;inset:0;background:radial-gradient(80% 60% at 100% 0%,rgba(241,132,70,.16),transparent 60%);pointer-events:none}
.sec-benefits .eyebrow{color:var(--gold)}
.sec-benefits .eyebrow .rule{background:var(--gold)}
.sec-benefits h2{color:#fff}
.sec-benefits .lead{color:rgba(234,241,245,.85)}
.ben-grid{display:grid;gap:14px;grid-template-columns:1fr;margin-top:clamp(28px,4vw,46px)}
.ben{
  display:grid;grid-template-columns:34px 1fr;gap:14px;align-items:start;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:16px 18px;transition:background .18s ease,border-color .18s ease,transform .18s ease;
}
.ben:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.24)}
.ben .tick{width:34px;height:34px;border-radius:10px;background:var(--naranja);color:#06263a;display:grid;place-items:center}
.ben p{margin:0;color:#eef4f7;font-size:.98rem;line-height:1.45}

/* ===================== Team ===================== */
.sec-team{background:var(--paper-3)}
.team-grid{display:grid;gap:20px;grid-template-columns:1fr;margin-top:clamp(30px,4vw,48px)}
.member{
  background:var(--paper-2);border:1px solid rgba(9,62,94,.09);border-radius:18px;
  padding:26px 22px 24px;text-align:center;box-shadow:var(--shadow-sm);
  transition:transform .2s ease, box-shadow .2s ease;position:relative;
}
.member:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.member .ph{
  width:118px;height:118px;border-radius:50%;margin:0 auto 14px;
  background:var(--lago);overflow:hidden;
  box-shadow:0 0 0 4px var(--lago),0 8px 20px -8px rgba(9,62,94,.45);
  display:grid;place-items:center;
}
.member .ph img{width:100%;height:100%;object-fit:cover}
.member .ph .initials{font-family:var(--font-title);font-weight:800;color:var(--morazul);font-size:2rem}
.member .num{
  position:absolute;top:16px;left:16px;width:30px;height:30px;border-radius:50%;
  background:var(--morazul);color:var(--gold);display:grid;place-items:center;
  font-family:var(--font-title);font-weight:800;font-size:.9rem;
}
.member h3{color:var(--morazul);font-size:1.16rem;margin-bottom:8px}
.member .areas{color:var(--muted);font-size:.9rem;line-height:1.5}

/* ===================== CTA ===================== */
.sec-cta{background:linear-gradient(160deg,var(--morazul),var(--morazul-2));color:#eaf1f5;position:relative;overflow:hidden}
.sec-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(70% 90% at 90% 10%,rgba(254,219,155,.16),transparent 55%);pointer-events:none}
.cta-card{display:grid;gap:28px;grid-template-columns:1fr;align-items:center;position:relative}
.cta-card h2{color:#fff;font-size:clamp(1.6rem,3vw,2.3rem);max-width:22ch}
.cta-card .lead{color:rgba(234,241,245,.88);margin-top:1rem;max-width:52ch}
.cta-price{display:flex;align-items:baseline;gap:.5em;margin:1.3rem 0 .4rem;flex-wrap:wrap}
.cta-price .amt{font-family:var(--font-title);font-weight:800;color:var(--gold);font-size:clamp(1.9rem,4vw,2.6rem);letter-spacing:.05em}
.cta-price .tax{font-family:var(--font-sub);color:rgba(234,241,245,.85)}
.cta-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:1.4rem}
.cta-note{display:flex;align-items:flex-start;gap:.5em;margin-top:1.2rem;font-size:.9rem;color:var(--gold)}
.cta-note .ic{flex:none;margin-top:.12em}
.cta-note + .cta-note{margin-top:.45rem;color:rgba(234,241,245,.8)}
.cta-panel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:26px;box-shadow:var(--shadow-navy)}
.cta-panel h3{color:#fff;font-family:var(--font-sub);font-weight:400;font-size:1.1rem;margin-bottom:14px}
.cta-panel ul{list-style:none;padding:0;margin:0;display:grid;gap:12px}
.cta-panel li{display:flex;gap:.7em;align-items:flex-start;font-size:.95rem;color:#eef4f7}
.cta-panel li .ic{color:var(--gold);margin-top:.15em;flex:none}

/* ===================== Footer ===================== */
.site-footer{background:var(--morazul-3);color:rgba(234,241,245,.75)}
.footer-in{padding:44px 0 30px;display:grid;gap:24px;grid-template-columns:1fr}
.footer-contact a{display:inline-flex;align-items:center;gap:.55em}
.footer-contact .ic{width:1.05em;height:1.05em;color:var(--gold);flex:none}
.footer-brand img{height:52px;border-radius:10px;margin-bottom:12px}
.footer-brand p{max-width:44ch;font-size:.92rem;color:rgba(234,241,245,.65)}
.footer-links{display:flex;flex-wrap:wrap;gap:18px}
.footer-links a{color:rgba(234,241,245,.8);text-decoration:none;font-size:.92rem}
.footer-links a:hover{color:#fff;text-decoration:underline}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);margin-top:8px;padding-top:18px;font-size:.82rem;color:rgba(234,241,245,.55);display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between}

/* ===================== Reveal animations ===================== */
.js .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s cubic-bezier(.22,.61,.36,1),transform .6s cubic-bezier(.22,.61,.36,1)}
.js .reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){
  .js .reveal{opacity:1 !important;transform:none !important;transition:none !important}
  .btn,.iconbtn,.member,.route-num,.route-card{transition:none !important}
  html{scroll-behavior:auto}
}
html{scroll-behavior:smooth}

/* ===================== Responsive ===================== */
@media (min-width:560px){
  .startbar{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr 1fr}
  .ben-grid{grid-template-columns:1fr 1fr}
  .footer-in{grid-template-columns:1.2fr 1fr}
}
@media (min-width:820px){
  .brand .bt{display:block;margin-left:10px;color:#fff;font-family:var(--font-sub);font-size:.98rem;line-height:1.1}
  .brand .bt small{display:block;color:var(--gold);font-size:.72rem;letter-spacing:.03em}
  .nav-links{display:flex}
  .two-col{grid-template-columns:1.15fr .85fr}
  .drawer .cols{grid-template-columns:1fr 1fr}
  .team-grid{grid-template-columns:repeat(3,1fr)}
  .footer-in{grid-template-columns:1.25fr .7fr 1.05fr}
  .detail-grid{grid-template-columns:repeat(3,1fr)}
  .detail.price{grid-column:span 3}
  .ben-grid{grid-template-columns:repeat(3,1fr)}
  .cta-card{grid-template-columns:1.25fr .75fr}
}
@media (min-width:920px){
  .nav .cta-mini{display:inline-flex}
  .nav .cta-direct{display:none}
}
@media (min-width:1240px){
  .nav .cta-direct{display:inline-flex}
}
@media (max-width:819px){
  .detail.price{order:-1}
}

/* ===================== Print ===================== */
@media print{
  @page{margin:12mm}
  :root{--paper:#fff;--paper-2:#fff;--paper-3:#fff}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  /* Sin esto, todo bloque .reveal aún no animado se imprime invisible (opacity 0). */
  .js .reveal{opacity:1 !important;transform:none !important;transition:none !important}
  body{font-size:11.5pt;background:#fff}
  .site-header,.drawer,.hero-cta,.cta-legend,.hero-stats,.nav-tools,.switch-wrap .opt-meta,.startbar,.route-card input[type="date"],.cta-actions,.footer-links,.no-print{display:none !important}
  /* If printing while in edit mode, the title input must read as plain text. */
  .route-card .edit-title{border:0 !important;padding:0 !important;background:transparent !important;box-shadow:none !important;width:100% !important}
  .section{padding:16pt 0}
  .hero{background:var(--morazul) !important;color:#fff !important}
  .hero-inner{padding:22pt 0}
  .hero h1{font-size:26pt}
  a[href]::after{content:''}
  .route-item,.detail,.member,.ben,.cap,.ent-list li,.cta-card,.group-cta{break-inside:avoid;page-break-inside:avoid}
  .footer-contact{display:flex !important}
  .sec-benefits,.sec-cta,.ent-card,.detail.price,.route-num{background:var(--morazul) !important;color:#fff !important}
  .wrap{max-width:100%}
  .switch button.on{background:var(--morazul) !important;color:#fff !important}
  .when{border:1px solid #d9b48a}
}
</style>

<div v-cloak>

        <div class="hero-cta">
          <a class="btn primary" :href="preLink" target="_blank" rel="noopener">

            <svg class="ic" viewBox="0 0 24 24"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5"/></svg>

  <section class="section sec-ruta" id="ruta">

      </p>

      <!-- start-date controls (edit mode) -->
      <div class="startbar reveal" v-show="editing">
        <div class="field">
          <label v-if="option==='semanal'">Fecha de inicio · sesiones semanales</label>
          <label v-else>Fecha de inicio · semana intensiva</label>
          <input type="date" v-model="starts[option]" />
        </div>
        <div class="field">
          <label>Horario (texto editable)</label>
          <input type="text" v-model="horario[option]" />
        </div>

    intro2:'Con contenido, herramientas prácticas y un equipo experto, te acompañamos para diseñar, adaptar y autogestionar tu Programa de Transparencia y Ética Empresarial, elevando tus prácticas y capacidades institucionales.',

  const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function pad(n){ return String(n).padStart(2,'0'); }
  function parseISO(iso){ if(!iso||!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return null; const [y,m,d]=iso.split('-').map(Number); const dt=new Date(y,m-1,d); return isNaN(dt.getTime())?null:dt; }
  function fmtISO(iso){ const dt=parseISO(iso); if(!dt) return ''; const mm=MESES[dt.getMonth()]; return dt.getDate()+' '+mm.charAt(0).toUpperCase()+mm.slice(1); }
  function fmtISOy(iso){ const dt=parseISO(iso); if(!dt) return ''; const mm=MESES[dt.getMonth()]; return dt.getDate()+' '+mm+' '+dt.getFullYear(); }
  function addDays(iso, days){ const dt=parseISO(iso); if(!dt) return ''; dt.setDate(dt.getDate()+days); return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate()); }
  createApp({
    template:'#app-template',
    setup(){
      // hydrate from saved state if present
      let initial = DEFAULTS();
      try{
        const raw = document.getElementById('app-state').textContent.trim();
        if(raw && raw[0]==='{'){ const saved=JSON.parse(raw); initial = Object.assign(initial, saved); }
      }catch(e){ /* ignore */ }

      const state = reactive(initial);
      state.images = IMAGES;
      state.logo = IMAGES.logo;

      const priceAmount = computed(()=>{ const m=String(state.price).match(/^(.*?)(\+.*)?$/); return (m&&m[1]?m[1]:state.price).trim(); });

      // ISO date of a weekly-cycle module: manual override wins, else computed from start date.
      function weeklyISO(mod){
        if(mod.ow) return mod.ow;
        if(state.starts.semanal) return addDays(state.starts.semanal, 7*mod.wk);
        return '';
      }
      // Open cycle (weekly) date range: start = module 1, end = module 10.
      const cicloRango = computed(()=>{
        const mods=state.modules;
        if(!mods.length) return '';
        const first=weeklyISO(mods[0]);
        const last=weeklyISO(mods[mods.length-1]);
        if(first && last) return 'Del '+fmtISOy(first)+' al '+fmtISOy(last);
        if(first) return 'Desde el '+fmtISOy(first);
        return state.semester+' · fechas por definir';
      });
      const waLink = computed(()=>{ const d=String(state.contactPhone||'').replace(/\D/g,''); return d ? 'https://wa.me/'+d : ''; });
      const priceTax = computed(()=>{ const m=String(state.price).match(/(\+\s*\S.*)$/); return m?m[1].trim():''; });

      function iconPath(name){ return ICONS[name] || ICONS.shield; }

      function displayDate(m){
        if(state.option==='semanal'){
          if(m.ow) return fmtISO(m.ow);
          if(state.starts.semanal) return fmtISO(addDays(state.starts.semanal, 7*m.wk));
        } else {
          if(m.oi) return fmtISO(m.oi);
          if(state.starts.intensiva) return fmtISO(addDays(state.starts.intensiva, m.dy));
        }
        return '';
      }
      function setNodeDate(m, val){
        if(state.option==='semanal') m.ow=val; else m.oi=val;
      }
      function resetDates(){
        state.starts.semanal=''; state.starts.intensiva='';
        state.modules.forEach(m=>{ m.ow=''; m.oi=''; });
        flash('Fechas restablecidas a “Por definir”.', false);
      }

      function initials(name){ return (name||'').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

      function flash(msg, warn){ state.status=msg; state.statusWarn=!!warn; }

      function scrollTo(id){ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth'}); }

      // Printing always uses the read-only view, so edit fields never reach the paper.
      function printPage(){
        const wasEditing=state.editing;
        state.editing=false;
        nextTick(()=>{ window.print(); setTimeout(()=>{ state.editing=wasEditing; },300); });
      }

      function restoreDefaults(){
        if(!window.confirm('¿Restablecer todo el contenido original? Se perderán los cambios que hayas hecho en esta página.')) return;
        const d=DEFAULTS();
        Object.keys(d).forEach(k=>{ state[k]=d[k]; });
        state.editing=true;
        flash('Contenido restablecido a los valores originales.', false);
      }

      // ---------- file download helper ----------
      function download(filename, content, mime){
        const blob=new Blob([content],{type:mime||'text/plain;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download=filename;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),1500);
      }
      // ---------- download self-contained copy with current state ----------
      function exportState(){
        const s=JSON.parse(JSON.stringify(state));
        delete s.images; delete s.logo; delete s.status; delete s.statusWarn; delete s.editing;
        return s;
      }
      function downloadHtml(){
        const wasEditing=state.editing;
        state.editing=false;
        nextTick(()=>{
          const clone=document.documentElement.cloneNode(true);
          const st=clone.querySelector('#app-state');
          if(st){ const s=exportState(); s.published=true; st.textContent=JSON.stringify(s); }
          const appEl=clone.querySelector('#app'); if(appEl) appEl.innerHTML=''; // fresh render on reopen
          const html='<!DOCTYPE html>\n'+clone.outerHTML;
          download('ciclo-etica-transparencia-4hands.html', html, 'text/html;charset=utf-8');
          state.editing=wasEditing;
          flash('Se descargó la versión final para compartir: conserva tus fechas y enlaces, sin las opciones de edición y descarga.', false);
        });
      }

      onMounted(()=>{
        document.body.classList.add('js');
        const items=document.querySelectorAll('.reveal');
        if('IntersectionObserver' in window){
          const io=new IntersectionObserver((entries)=>{
            entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
          },{rootMargin:'0px 0px -8% 0px', threshold:0.08});
          items.forEach(el=>io.observe(el));
        } else {
          items.forEach(el=>el.classList.add('in'));
        }
      });

      return Object.assign(toRefs(state), {
        priceAmount, priceTax, waLink, cicloRango, iconPath, displayDate, setNodeDate, resetDates,
        initials, scrollTo, printPage, restoreDefaults, downloadHtml
      });
    }
  }).mount('#app');
})();
</script>
